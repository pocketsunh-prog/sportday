spring:
  application:
    name: sportday-backend
  datasource:
    url: jdbc:mysql://localhost:3307/sportday?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: sportday
    password: sportday123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

app:
  jwt:
    secret: sportdaySecretKeyForJwtTokenGenerationMustBeAtLeast256BitsLong1234567890
    expiration: 86400000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

logging:
  level:
    com.sportday: DEBUG
